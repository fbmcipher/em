name: BrowserStack

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      rerun_id:
        description: 'Optional ID for tracking repeated runs'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  COPILOT_AGENT_FIREWALL_ALLOW_LIST_ADDITIONS: googlechromelabs.github.io,storage.googleapis.com

jobs:
  run:
    name: BrowserStack
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.changed_files > 0

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}

      # `pull_request_target` runs the workflow file from the default branch but checks out the PR's
      # head code. PRs that branched before the HTTPS dev server migration don't have the plugins
      # this workflow needs (basic-ssl, tunnel-token gate), so the server can't start. Skip the job
      # gracefully and tell the author to rebase rather than failing.
      - name: Detect HTTPS dev server support
        id: https_check
        run: |
          if grep -q "@vitejs/plugin-basic-ssl" vite.config.ts; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=BrowserStack skipped::This PR predates the HTTPS dev server migration. Rebase onto current main to enable iOS testing."
          fi

      - name: Enable Corepack
        if: steps.https_check.outputs.supported == 'true'
        run: corepack enable

      - name: Set Node.js version
        if: steps.https_check.outputs.supported == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        if: steps.https_check.outputs.supported == 'true'
        run: yarn

      - name: Build
        if: steps.https_check.outputs.supported == 'true'
        run: yarn build

      - name: Generate tunnel token
        if: steps.https_check.outputs.supported == 'true'
        run: |
          TOKEN=$(openssl rand -hex 16)
          echo "::add-mask::$TOKEN"
          echo "TUNNEL_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Serve
        if: steps.https_check.outputs.supported == 'true'
        run: |
          yarn servebuild &

          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -k "https://localhost:3000?__token=$TUNNEL_TOKEN" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30: status $HTTP_STATUS"
            if [ $i -eq 30 ]; then
              echo "Server failed to respond after 30 attempts"
              exit 1
            fi
            sleep 1
          done

      - name: Test iOS on BrowserStack
        if: steps.https_check.outputs.supported == 'true'
        run: yarn test:ios
        env:
          BROWSERSTACK_USERNAME: ${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY: ${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_BUILD_NAME: 'CI - ${{github.run_id}}'
          BROWSERSTACK_PROJECT_NAME: 'em'
          TUNNEL_TOKEN: ${{env.TUNNEL_TOKEN}}
